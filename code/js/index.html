<!-- index.html -->
<script src="js/state.js"></script>

<!-- load all chart files -->
<script src="js/charts/choropleth.js"></script>
<script src="js/charts/barchart.js"></script>
<script src="js/charts/linechart.js"></script>
<script src="js/charts/scatter.js"></script>
<script src="js/charts/radar.js"></script>
<script src="js/charts/areachart.js"></script>

<script>
  // Load data ONCE, pass to all charts
  d3.csv("data/HDR25_SDG5_long_format_preprocessed.csv", d => ({
    ...  // type conversion here
  })).then(data => {
    initChoropleth(data);
    initBarChart(data);
    initLineChart(data);
    initScatter(data);
    initRadar(data);
    initAreaChart(data);
  });

  // Wire up global filters
  d3.select("#year-slider").on("input", function() {
    state.selectedYear = +this.value;
    updateAll();
  });

  d3.select("#hdi-filter").on("change", function() {
    state.selectedHDIGroup = this.value;
    updateAll();
  });
</script>
